
apiVersion: apps/v1
kind: Deployment
metadata: { name: nasij-marketplace }
spec:
  replicas: 2
  selector: { matchLabels: { app: nasij-marketplace } }
  template:
    metadata: { labels: { app: nasij-marketplace } }
    spec:
      containers:
        - name: mkt
          image: nasij/marketplace:3.1
          ports: [{ containerPort: 9110 }]
