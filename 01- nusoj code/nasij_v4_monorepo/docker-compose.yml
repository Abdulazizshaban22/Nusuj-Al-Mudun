services:
  db:
    image: postgis/postgis:16-3.4
    container_name: nasij_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d

  web:
    build: ./apps/web
    container_name: nasij_web
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      API_BASE_URL: "http://api:4000"
      ETL_BASE_URL: "http://etl:5000"
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
      - etl

  api:
    build: ./services/api
    container_name: nasij_api
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      PORT: ${API_PORT:-4000}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      - db

  etl:
    build: ./services/etl
    container_name: nasij_etl
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      PORT: ${ETL_PORT:-5000}
    ports:
      - "${ETL_PORT:-5000}:5000"
    depends_on:
      - db

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: nasij_mqtt
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  grafana:
    image: grafana/grafana:11.2.0
    container_name: nasij_grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana

  # مفعّل لاحقًا عند الحاجة في dev
  # keycloak:
  #   image: quay.io/keycloak/keycloak:26.0
  #   command: start-dev
  #   environment:
  #     KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
  #     KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
  #   ports:
  #     - "8080:8080"

volumes:
  db_data: {}
  grafana_data: {}