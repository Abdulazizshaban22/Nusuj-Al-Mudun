version: "3.9"
services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["5432:5432"]
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./sql:/sql
  pg_tileserv:
    image: pramsey/pg_tileserv:latest
    environment: { DATABASE_URL: ${DATABASE_URL} }
    depends_on: [db]
    ports: ["7800:7800"]
  api:
    build: ../services/api
    environment: { DATABASE_URL: ${DATABASE_URL} }
    depends_on: [db]
    ports: ["8088:8088"]
  web:
    build: ../apps/web
    environment: { NEXT_PUBLIC_API_BASE: http://localhost:8088 }
    depends_on: [api]
    ports: ["3000:3000"]
  etl:
    build: ../services/etl
    environment: { DATABASE_URL: ${DATABASE_URL}, OSRM_BASE_URL: ${OSRM_BASE_URL} }
    depends_on: [db, osrm]
    ports: ["9101:9101"]
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
  osrm:
    image: peterevans/osrm-backend:latest
    environment: { OSRM_PBF_URL: ${OSRM_PBF_URL} }
    ports: ["5000:5000"]
volumes:
  db_data:
